name: CUDA Cache Restore Test (GPU Runner)

on:
  workflow_dispatch:
  push:
    branches: [debug/cuda-cache-test]

# Only one job at a time on the GPU runner
concurrency:
  group: cuda-cache-test
  cancel-in-progress: false

jobs:
  apt_upgrade_analysis:
    runs-on: nvidia-runner-1
    timeout-minutes: 30
    name: Analyse apt install behavior (new vs upgrade vs recommends)
    steps:
      - name: Runner baseline
        run: |
          echo "=== Runner info ==="
          uname -a
          cat /etc/os-release | head -3
          echo ""
          echo "=== Pre-installed package count ==="
          dpkg-query -W -f='${Package}\n' | wc -l
          echo ""
          echo "=== Pre-installed gcc-14-base ==="
          dpkg -s gcc-14-base 2>&1 | grep -E "^(Package|Version|Architecture)" || echo "(not installed)"
          dpkg -s gcc-14-base:i386 2>&1 | grep -E "^(Package|Version|Architecture)" || echo "(no i386 variant)"
          echo ""
          echo "=== Packages with pending upgrades ==="
          apt list --upgradable 2>/dev/null | head -30 || true
        shell: bash

      - name: Simulate cuda-nvcc-12-6 install
        run: |
          sudo apt-get update -qq

          # Upgrade lines: "Inst pkg [old_ver] (new_ver repo [arch])"
          # New install:   "Inst pkg (new_ver repo [arch])"
          echo "=== apt-get install --simulate --show-upgraded cuda-nvcc-12-6 ==="
          sudo apt-get install --simulate --show-upgraded cuda-nvcc-12-6 2>&1 | tee /tmp/simulate-default.txt
          echo ""

          echo "=== Summary ==="
          echo "New installs: $(grep "^Inst " /tmp/simulate-default.txt | grep -cv "^Inst [^ ]* \[" || echo 0)"
          echo "Upgrades:     $(grep -c "^Inst [^ ]* \[" /tmp/simulate-default.txt || echo 0)"
          echo ""
          echo "Upgraded packages:"
          grep "^Inst [^ ]* \[" /tmp/simulate-default.txt || echo "(none)"
        shell: bash

      - name: Simulate vajax full package list
        run: |
          PKGS="llvm-18-dev clang-18 libclang-18-dev lld-18 libsuitesparse-dev libopenblas-dev swig cmake cuda-toolkit-12-6 cuda-nsight-systems-12-6 libcudnn9-cuda-12 libcudss0-cuda-12 pkg-config"

          echo "=== apt-get install --simulate --show-upgraded ${PKGS} ==="
          sudo apt-get install --simulate --show-upgraded ${PKGS} 2>&1 | tee /tmp/simulate-vajax.txt
          echo ""

          TOTAL=$(grep -c "^Inst " /tmp/simulate-vajax.txt || echo 0)
          NEW=$(grep "^Inst " /tmp/simulate-vajax.txt | grep -cv "^Inst [^ ]* \[" || echo 0)
          UPG=$(grep -c "^Inst [^ ]* \[" /tmp/simulate-vajax.txt || echo 0)
          echo "=== Summary ==="
          echo "Total: ${TOTAL}  (New: ${NEW}, Upgrades: ${UPG})"
          echo ""
          echo "Upgraded packages:"
          grep "^Inst [^ ]* \[" /tmp/simulate-vajax.txt || echo "(none)"
        shell: bash

      - name: Actual install + dpkg integrity check
        run: |
          echo "=== Pre-install dpkg check ==="
          sudo dpkg --audit 2>&1 | head -10 || true
          sudo apt-get check 2>&1 | tail -5
          echo ""

          echo "=== gcc-14-base BEFORE install ==="
          dpkg -s gcc-14-base 2>&1 | grep -E "^(Package|Version|Architecture)" || echo "(not installed)"
          dpkg -s gcc-14-base:i386 2>&1 | grep -E "^(Package|Version|Architecture)" || echo "(no i386 variant)"
          echo ""

          echo "=== Installing cuda-nvcc-12-6 libopenblas-dev ==="
          sudo DEBIAN_FRONTEND=noninteractive apt-get --yes install cuda-nvcc-12-6 libopenblas-dev 2>&1 | tee /tmp/actual-install.txt
          echo ""

          echo "=== gcc-14-base AFTER install ==="
          dpkg -s gcc-14-base 2>&1 | grep -E "^(Package|Version|Architecture)" || echo "(not installed)"
          dpkg -s gcc-14-base:i386 2>&1 | grep -E "^(Package|Version|Architecture)" || echo "(no i386 variant)"
          echo ""

          echo "=== Upgraded packages (from install log) ==="
          grep "^Unpacking .* over " /tmp/actual-install.txt || echo "(no upgrades logged)"
          echo ""

          echo "=== Multi-arch packages installed ==="
          grep "^Unpacking .*:i386" /tmp/actual-install.txt || echo "(no i386 packages)"
          echo ""

          echo "=== Post-install dpkg audit ==="
          sudo dpkg --audit 2>&1 | tee /tmp/dpkg-audit.txt
          echo ""

          echo "=== Post-install apt-get check ==="
          sudo apt-get check 2>&1 | tee /tmp/apt-check.txt
          echo ""

          echo "=== Post-install apt-get update ==="
          sudo apt-get update -qq 2>&1 | tee /tmp/apt-update.txt
          APT_RC=$?
          echo "apt-get update exit code: ${APT_RC}"
          echo ""

          echo "=== Verify packages work ==="
          nvcc --version || echo "FAIL: nvcc not found"
          dpkg -s libopenblas-dev 2>&1 | grep -E "^(Package|Version|Status)" || echo "FAIL: libopenblas-dev not registered"
          echo ""

          if grep -q "^E:" /tmp/apt-check.txt 2>/dev/null; then
            echo "FAIL: apt-get check reported errors after install"
            cat /tmp/apt-check.txt
            exit 1
          fi
          echo "SUCCESS: dpkg integrity OK after install with upgrades"
        shell: bash
